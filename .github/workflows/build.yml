name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gnu-efi

      - name: Build
        run: make

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="continuous"
          gh release delete "$TAG" -y 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            BOOTX64.EFI \
            --title "Continuous build (${{ github.sha }})" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --target "${{ github.sha }}"
