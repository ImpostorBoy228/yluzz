name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gnu-efi

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BOOTX64
          path: BOOTX64.EFI

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="continuous"
          RELEASE_URL=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.tag_name == "'"$TAG"'") | .url' 2>/dev/null || true)

          if [ -z "$RELEASE_URL" ]; then
            gh release create "$TAG" \
              --title "Continuous build (${{ github.sha }})" \
              --notes "Automated build from commit ${{ github.sha }}" \
              --prerelease \
              --target "${{ github.sha }}"
          else
            gh release upload "$TAG" BOOTX64.EFI --clobber 2>/dev/null || true
          fi
